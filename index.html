<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="display">
            <input type="text" id="display">
            <div class="row">
            <button style="color: red;" onclick="clearDisplay()">C</button>
            <button style="color: rgb(11, 255, 52); " onclick="deleteLast()">DEL</button>
            <button style="color: rgb(11, 255, 52); " onclick="appendValue('%')">%</button>
            <button style="color: rgb(11, 255, 52); " onclick="appendValue('/')">&divide;</button>
            </div>
        <div class="row">
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button style="color: rgb(11, 255, 52); " onclick="appendValue('*')">&times;</button>
            </div>
            <div class="row">
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button style="color: rgb(11, 255, 52); " onclick="appendValue('-')">-</button>
            </div>
            <div class="row">
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button style="color: rgb(11, 255, 52); " onclick="appendValue('+')">+</button>
            </div>
            <div class="row">
            <button>+/-</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button style=" background-color: rgb(11, 255, 52); color: white;" onclick="calculate()">=</button>
            </div>
    </div>
</body>
</html>
